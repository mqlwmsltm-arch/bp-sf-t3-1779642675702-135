<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1181" cy="646" r="23" fill="#047857" opacity="0.20"/>
    <circle cx="1111" cy="556" r="46" fill="#047857" opacity="0.06"/>
    <circle cx="726" cy="292" r="82" fill="#047857" opacity="0.19"/>
    <circle cx="1161" cy="104" r="95" fill="#047857" opacity="0.11"/>
    <circle cx="811" cy="425" r="99" fill="#047857" opacity="0.17"/>
    <circle cx="1265" cy="215" r="43" fill="#047857" opacity="0.14"/>
    <rect x="98" y="678" width="34" height="93" rx="8" fill="#059669" opacity="0.13" transform="rotate(13, 971, 434)"/>
    <rect x="460" y="380" width="49" height="59" rx="8" fill="#059669" opacity="0.08" transform="rotate(42, 1085, 719)"/>
    <rect x="770" y="132" width="42" height="80" rx="8" fill="#059669" opacity="0.08" transform="rotate(44, 1033, -40)"/>
    <rect x="1104" y="398" width="58" height="22" rx="8" fill="#059669" opacity="0.04" transform="rotate(1, 529, 363)"/>
    <rect x="913" y="597" width="33" height="96" rx="8" fill="#059669" opacity="0.10" transform="rotate(37, 42, 636)"/>
    <rect x="725" y="-22" width="25" height="75" rx="8" fill="#059669" opacity="0.05" transform="rotate(44, 989, 210)"/>
    <rect x="606" y="307" width="46" height="55" rx="8" fill="#059669" opacity="0.12" transform="rotate(10, 569, 699)"/>
    <rect x="-65" y="704" width="46" height="40" rx="8" fill="#059669" opacity="0.13" transform="rotate(16, 39, 440)"/>
    <polygon points="1001,10 1062,132 940,132" fill="#047857" opacity="0.03"/>
    <polygon points="830,656 874,744 786,744" fill="#047857" opacity="0.12"/>
    <polygon points="900,557 978,713 822,713" fill="#047857" opacity="0.13"/>
    <polygon points="284,-144 382,52 186,52" fill="#047857" opacity="0.06"/>

  <!-- Wave at bottom -->
  <path d="M0,538 C360,584 840,492 1200,538 L1200,630 L0,630Z" fill="#047857" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    백링크 대행 사이트
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 신작애니
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#34d399" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 백링크 대행 사이트 — 신작애니
  </text>
</svg>